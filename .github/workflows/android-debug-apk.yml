name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper inside CI
        run: gradle --no-daemon wrapper --gradle-version 8.11.1

      - name: Build debug APK
        run: ./gradlew --no-daemon clean assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bedtime-stories-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error